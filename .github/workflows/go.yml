name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: openrewrite/rewrite
          path: openrewrite/rewrite

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: recipes-code-quality/go.sum

      - name: Update replace directive for CI layout
        working-directory: recipes-code-quality
        run: go mod edit -replace=github.com/openrewrite/rewrite=../openrewrite/rewrite/rewrite-go/rewrite

      - name: Vet compilable packages
        working-directory: recipes-code-quality
        run: |
          # Find packages that compile successfully and run go vet on them
          packages=$(go list ./... 2>/dev/null || true)
          if [ -n "$packages" ]; then
            echo "$packages" | xargs go vet 2>&1 || true
          fi
          # Report packages that failed to list (missing upstream deps)
          go list ./... 2>&1 | grep -i "no required module" && echo "::warning::Some packages have unresolved imports (upstream deps not yet published)" || true

