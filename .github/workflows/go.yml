name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipes-code-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Drop local replace directive
        run: go mod edit -dropreplace=github.com/openrewrite/rewrite

      - name: Tidy modules
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1
